<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام التوقيع</title>
    
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">

    <style>
        :root { --primary-color: #6a1b9a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #fff; }
        
        .container { position: relative; width: 100%; height: 100%; }

        /* إطار التحميل الذكي */
        iframe {
            width: 100%; height: 100%; border: none;
            opacity: 0; /* مخفي في البداية لتجنب وميض اللون الأبيض */
            transition: opacity 0.5s ease-in-out;
            z-index: 2;
        }

        /* شاشة التحميل السريعة */
        .loader-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #ffffff; z-index: 1;
        }

        .progress-bar {
            width: 150px; height: 4px; background: #eee;
            border-radius: 10px; overflow: hidden; margin-top: 15px;
        }

        .progress-line {
            width: 0%; height: 100%; background: var(--primary-color);
            animation: load 2s infinite ease-in-out;
        }

        @keyframes load {
            0% { width: 0%; transform: translateX(-100%); }
            50% { width: 70%; }
            100% { width: 100%; transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader" class="loader-wrapper">
            <div class="progress-bar"><div class="progress-line"></div></div>
            <p style="font-family: sans-serif; color: #666; font-size: 14px;">جاري الاتصال بالنظام...</p>
        </div>
        
        <iframe 
            id="sigFrame"
            src="https://script.google.com/macros/s/AKfycbxz0JzAM6sQdyDcWLzaA5kexMSitGYNepSG5freMDIp53LL6N3cc9S9IPpN_Qn1TJs8cA/exec" 
            allow="camera; display-capture"
            onload="showIframe()">
        </iframe>
    </div>

    <script>
        // وظيفة لإظهار الإطار فور اكتمال تحميله داخلياً
        function showIframe() {
            const iframe = document.getElementById('sigFrame');
            const loader = document.getElementById('loader');
            iframe.style.opacity = '1';
            // إزالة شاشة التحميل بعد 500ms من ظهور المحتوى لضمان السلاسة
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
