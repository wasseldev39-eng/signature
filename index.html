<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإشتراك الذكي</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            color: #6a1b9a;
            margin-bottom: 20px;
        }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; line-height: 1.6; }
        
        .btn-launch {
            background-color: #6a1b9a;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-launch:hover {
            background-color: #4a148c;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">✍️</div>
    <h2>نظام التوقيع الرقمي</h2>
    <p>لضمان الأمان وتفعيل الكاميرا بشكل صحيح، يرجى الضغط على الزر أدناه لفتح واجهة التوقيع.</p>
    
    <a href="https://script.google.com/macros/s/AKfycbywgNlocVmrtJog7qEtOCp3IhbF-oWclUFeQmbyOQORFZ_iEazX8IVrwf9xctM1q41E/exec" 
       target="_blank" 
       class="btn-launch">
        فتح نظام التوقيع الآن
    </a>
</div>

</body>
</html>
